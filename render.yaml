services:
  # Serviço Node.js
  - type: web
    name: xmlanalise-node
    runtime: node
    repo: https://github.com/silviobsjunior/xmlanalise
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: NODE_ENV
        value: production

  # Serviço Python FastAPI
  - type: web
    name: xmlanalise-python
    runtime: python
    repo: https://github.com/silviobsjunior/xmlanalise
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
