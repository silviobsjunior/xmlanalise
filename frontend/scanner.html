<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aqui Tem - Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #5c6bc0;
            --bg: #0b0c14;
            --surface: #1a1b26;
            --text: #ffffff;
            --accent: #ff4081;
            --success: #00e676;
            --warning: #ffea00;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            padding: 16px;
            text-align: center;
            background: rgba(26, 27, 38, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header h3 { margin: 0; font-weight: 800; letter-spacing: 1px; color: var(--primary); }
        .header p { font-size: 0.75rem; margin: 4px 0 0; opacity: 0.7; }

        .scanner-container {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            justify-content: center;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }

        .scanner-overlay-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            height: 180px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            z-index: 10;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid var(--primary);
            pointer-events: none;
        }
        .top-left { top: -4px; left: -4px; border-right: 0; border-bottom: 0; border-radius: 16px 0 0 0; }
        .top-right { top: -4px; right: -4px; border-left: 0; border-bottom: 0; border-radius: 0 16px 0 0; }
        .bottom-left { bottom: -4px; left: -4px; border-right: 0; border-top: 0; border-radius: 0 0 0 16px; }
        .bottom-right { bottom: -4px; right: -4px; border-left: 0; border-top: 0; border-radius: 0 0 16px 0; }

        .scan-line {
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            position: absolute;
            box-shadow: 0 0 20px var(--accent);
            animation: moveScan 2.5s ease-in-out infinite;
        }

        @keyframes moveScan {
            0%, 100% { top: 20%; opacity: 0.2; }
            50% { top: 80%; opacity: 1; }
        }

        .instruction-toast {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 101;
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .footer {
            padding: 24px 20px env(safe-area-inset-bottom, 20px);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 100;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px 30px 0 0;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            height: 54px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }

        .btn-ghost { background: rgba(255,255,255,0.06); color: #ccc; }
        .btn-success { background: var(--success); color: #000; box-shadow: 0 8px 20px rgba(0, 230, 118, 0.2); }
        .btn-primary { background: var(--primary); color: white; }

        #result-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            z-index: 2000;
            backdrop-filter: blur(12px);
        }

        .modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 320px;
            padding: 32px 24px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .ean-display {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin: 24px 0;
            color: var(--primary);
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: rgba(92, 107, 192, 0.1);
            padding: 20px;
            border-radius: 16px;
        }

        .torch-active {
            background-color: var(--warning) !important;
            color: #000 !important;
        }

        #error-display {
            display: none;
            background: #ff5252;
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin: 10px;
            font-size: 0.8rem;
            text-align: center;
        }
        
        #loading-view {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-view">
        <div class="spinner"></div>
        <p style="margin-top: 15px; opacity: 0.6; font-size: 0.9rem;">Ligando câmera...</p>
    </div>

    <div class="header">
        <h3>🔍 AQUI TEM SCANNER</h3>
        <p id="status-text">Pronto para leitura</p>
    </div>

    <div class="scanner-container">
        <div id="reader"></div>
        <div id="error-display"></div>
        <div class="instruction-toast">Alinhe o código de barras no centro</div>
        <div class="scanner-overlay-box" id="overlay">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
            <div class="scan-line"></div>
        </div>
    </div>

    <!-- Modal de Resultado -->
    <div id="result-modal">
        <div class="modal-content">
            <div style="font-size: 0.75rem; font-weight: 800; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px;">CÓDIGO IDENTIFICADO</div>
            <div id="detected-ean" class="ean-display">00000000</div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button id="send-btn" class="btn btn-success">✅ BUSCAR ITEM</button>
                <button id="retry-btn" class="btn btn-ghost">🔄 TENTAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="controls">
            <button id="torch-btn" class="btn btn-ghost">💡 LANTERNA</button>
            <button id="restart-btn" class="btn btn-ghost">🔄 RECARREGAR</button>
        </div>
        <button onclick="tg.close()" class="btn btn-ghost" style="opacity: 0.6; font-size: 0.8rem; height: 40px;">FECHAR SCANNER</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation();

        let html5QrCode;
        let isTorchOn = false;
        let isProcessing = false;

        async function initCamera() {
            try {
                if (html5QrCode) {
                    await html5QrCode.stop().catch(() => {});
                    html5QrCode.clear();
                }
                
                html5QrCode = new Html5Qrcode("reader", { verbose: false });
                
                const onScanSuccess = (decodedText) => {
                    if (isProcessing) return;
                    isProcessing = true;

                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
                    
                    // Pausa a leitura para mostrar o resultado
                    html5QrCode.pause(true);
                    
                    document.getElementById('detected-ean').innerText = decodedText;
                    document.getElementById('result-modal').style.display = 'flex';
                };

                const config = { 
                    fps: 10,  // Reduzido para estabilidade
                    qrbox: (viewWidth, viewHeight) => {
                        const width = Math.min(viewWidth * 0.8, 300);
                        const height = width * 0.5;
                        return { width, height };
                    },
                    experimentalFeatures: {
                        useBarCodeDetectorIfSupported: true
                    },
                    aspectRatio: 1.0
                };

                // Delay para garantir que o DOM e as permissões estejam prontos
                setTimeout(async () => {
                    try {
                        await html5QrCode.start(
                            { facingMode: "environment" }, 
                            config, 
                            onScanSuccess
                        );
                        document.getElementById('status-text').innerText = "Câmera Ativa";
                        document.getElementById('loading-view').style.display = 'none';
                    } catch (e) {
                         console.error(e);
                         showError("Erro: Não foi possível acessar a câmera. Verifique as permissões.");
                    }
                }, 800);

            } catch (err) {
                console.error(err);
                showError("Erro inesperado ao iniciar o scanner.");
            }
        }

        function showError(msg) {
            const errDiv = document.getElementById('error-display');
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('status-text').innerText = "Falha no Scanner";
        }

        document.getElementById('torch-btn').addEventListener('click', async () => {
            if (!html5QrCode || !html5QrCode.isScanning) return;
            try {
                isTorchOn = !isTorchOn;
                await html5QrCode.applyVideoConstraints({
                    advanced: [{ torch: isTorchOn }]
                });
                document.getElementById('torch-btn').classList.toggle('torch-active', isTorchOn);
            } catch (e) {
                tg.showAlert("Lanterna não suportada neste dispositivo.");
                isTorchOn = false;
            }
        });

        document.getElementById('restart-btn').addEventListener('click', () => location.reload());

        document.getElementById('retry-btn').addEventListener('click', () => {
            isProcessing = false;
            document.getElementById('result-modal').style.display = 'none';
            if (html5QrCode) html5QrCode.resume();
        });

        document.getElementById('send-btn').addEventListener('click', () => {
            const ean = document.getElementById('detected-ean').innerText;
            if (ean && ean !== '-') {
                tg.sendData(ean);
                setTimeout(() => tg.close(), 150);
            }
        });

        // Tenta iniciar
        window.addEventListener('load', initCamera);
        
        // Trata fechamento/background
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && html5QrCode) {
                html5QrCode.pause(true);
            } else if (!document.hidden && html5QrCode && !isProcessing) {
                 html5QrCode.resume();
            }
        });
    </script>
</body>
</html>
