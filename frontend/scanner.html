<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aqui Tem - Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #5c6bc0;
            --bg: #1a1b2e;
            --text: #ffffff;
            --accent: #ff4081;
            --success: #4caf50;
        }

        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 10px;
            text-align: center;
            background: #242645;
            z-index: 10;
        }

        #reader {
            flex: 1;
            width: 100% !important;
            border: none !important;
            background: #000;
        }

        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 140px;
            border: 2px solid var(--primary);
            border-radius: 12px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
        }

        .scanner-line {
            width: 100%;
            height: 2px;
            background: var(--accent);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .footer {
            padding: 15px;
            background: #242645;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-cancel { background: #333; color: #ccc; }

        #result-banner {
            position: fixed;
            bottom: 140px;
            left: 15px;
            right: 15px;
            background: #ffffff;
            color: #1a1b2e;
            padding: 18px;
            border-radius: 14px;
            display: none;
            z-index: 200;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .torch-active {
            background-color: #ffd600 !important;
            color: #000 !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3 style="margin:0">🔍 Scanner Aqui Tem</h3>
        <p style="font-size:0.75rem; margin:4px 0 0; opacity:0.7">Centralize o código de barras no retângulo</p>
    </div>

    <div style="position: relative; flex:1; display: flex; flex-direction: column;">
        <div id="reader"></div>
        <div class="scanner-overlay" id="overlay">
            <div class="scanner-line"></div>
        </div>
    </div>

    <div id="result-banner">
        <div style="font-size: 0.8rem; font-weight: 600; opacity: 0.6; margin-bottom: 4px;">CÓDIGO ENCONTRADO</div>
        <div id="detected-ean" style="font-size: 1.5rem; font-weight: 900; letter-spacing: 2px;"></div>
        <div style="display: flex; gap: 8px; margin-top: 15px;">
            <button id="retry-btn" class="btn btn-cancel" style="flex:1">NOVO SCAN</button>
            <button id="send-btn" class="btn btn-success" style="flex:2">BUSCAR AGORA</button>
        </div>
    </div>

    <div class="footer">
        <div class="controls">
            <button id="torch-btn" class="btn btn-primary">🔦 LANTERNA</button>
            <button id="restart-btn" class="btn btn-cancel">🔄 REINICIAR</button>
        </div>
        <button onclick="tg.close()" class="btn btn-cancel" style="width: 100%;">FECHAR</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let html5QrCode;
        let lastResult = "";
        let isTorchOn = false;

        async function startScanning() {
            try {
                if (html5QrCode) {
                    await html5QrCode.stop().catch(() => {});
                }
                
                html5QrCode = new Html5Qrcode("reader");
                
                const qrCodeSuccessCallback = (decodedText) => {
                    if (decodedText === lastResult) return;
                    lastResult = decodedText;
                    
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
                    
                    // Pausa o vídeo e mostra o resultado
                    html5QrCode.pause(true);
                    
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('detected-ean').innerText = decodedText;
                    document.getElementById('result-banner').style.display = 'block';
                };

                const config = { 
                    fps: 20, 
                    qrbox: { width: 320, height: 160 },
                    aspectRatio: 1.0,
                    formatsToSupport: [ 6, 7, 4, 0 ] // EAN_13, EAN_8, CODE_128, QR
                };

                await html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback);
            } catch (err) {
                console.error("Scanner Error:", err);
                // Pequeno delay e tenta de novo se for erro de "Already started"
                if (err.toString().includes("already started")) {
                    setTimeout(startScanning, 500);
                }
            }
        }

        // Lanterna
        document.getElementById('torch-btn').addEventListener('click', async () => {
            if (!html5QrCode) return;
            try {
                isTorchOn = !isTorchOn;
                await html5QrCode.applyVideoConstraints({
                    advanced: [{ torch: isTorchOn }]
                });
                const btn = document.getElementById('torch-btn');
                if (isTorchOn) btn.classList.add('torch-active');
                else btn.classList.remove('torch-active');
            } catch (e) {
                console.warn("Torch not supported:", e);
                alert("Lanterna não suportada neste dispositivo.");
            }
        });

        // Reiniciar Câmera
        document.getElementById('restart-btn').addEventListener('click', () => {
            lastResult = "";
            document.getElementById('result-banner').style.display = 'none';
            document.getElementById('overlay').style.display = 'block';
            startScanning();
        });

        // Novo Scan (após sucesso)
        document.getElementById('retry-btn').addEventListener('click', () => {
            lastResult = "";
            document.getElementById('result-banner').style.display = 'none';
            document.getElementById('overlay').style.display = 'block';
            html5QrCode.resume();
        });

        // Enviar
        document.getElementById('send-btn').addEventListener('click', () => {
            if (lastResult) {
                tg.sendData(lastResult);
                tg.close();
            }
        });

        window.onload = () => setTimeout(startScanning, 500);
    </script>
</body>
</html>
