<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aqui Tem - Scanner Nativo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #5c6bc0;
            --bg: #1a1b2e;
            --text: #ffffff;
        }

        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 80%;
            text-align: center;
            padding: 20px;
            background: #242645;
            border-radius: 12px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Scanner Aqui Tem</h2>
        <p>Utilizando o leitor nativo do Telegram para maior precisão.</p>
        <button id="scan-btn" class="btn">Abrir Câmera</button>
        <p style="font-size: 0.8rem; margin-top: 20px; opacity: 0.6;">Dica: Se a leitura falhar, tente aproximar ou afastar o celular.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function startNativeScan() {
            // Abre o scanner nativo do Telegram
            if (tg.showScanQrPopup) {
                tg.showScanQrPopup({
                    text: "Aponte para o código de barras (EAN)"
                }, function(result) {
                    if (result && result.length > 0) {
                        // Ao encontrar um código, envia para o bot e encerra
                        tg.sendData(result);
                        tg.closeScanQrPopup();
                        return true; // Encerra o popup
                    }
                });
            } else {
                alert("Seu Telegram não suporta o scanner nativo diretamente.");
            }
        }

        document.getElementById('scan-btn').addEventListener('click', startNativeScan);

        // Tenta abrir automaticamente ao carregar
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(startNativeScan, 500);
        });
    </script>
</body>
</html>
